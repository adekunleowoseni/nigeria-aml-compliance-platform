# Nigeria AML Compliance Platform - Nginx reverse proxy
# SSL termination, API proxy, static serving
#
# Uses resolver + variables for backend/frontend so nginx does not fail at startup
# when Docker DNS has not yet resolved service names ("host not found in upstream").

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 20M;

        # Docker embedded DNS — defer upstream resolution to request time (not config load).
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8000;
        set $frontend_upstream http://frontend:3000;

        # API proxy to FastAPI
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # OpenAPI docs
        location /docs {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
        }

        # Health
        location /health {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
        }

        # Frontend (React/Vite)
        location / {
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTPS server (uncomment and set ssl_certificate when using SSL)
    # server {
    #     listen 443 ssl;
    #     server_name localhost;
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/ssl/key.pem;
    #     # ... same location blocks as above
    # }
}
