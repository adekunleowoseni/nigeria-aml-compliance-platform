services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aml_platform
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [aml-net]

  neo4j:
    image: neo4j:5.22
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}"
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [aml-net]

  zookeeper:
    image: zookeeper:3.9.3
    environment:
      ZOO_CLIENT_PORT: 2181
      ZOO_TICK_TIME: 2000
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,srvr,stat,conf,mntr"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec \"exec 3<>/dev/tcp/127.0.0.1/2181; echo ruok >&3; head -c 16 <&3 | grep -q imok\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [aml-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Smaller heap helps Docker Desktop / low-RAM hosts (avoids slow OOM thrash)
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx768m"
    ports:
      - "9092:9092"
    healthcheck:
      # Use 127.0.0.1 (not localhost): on some Windows Docker setups localhost resolves to ::1
      # while the broker listens on IPv4 only, so the check fails until marked unhealthy.
      # Lighter than kafka-topics; broker often needs 60–180s on first start / low-RAM hosts.
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 15s
      retries: 35
      start_period: 180s
    restart: unless-stopped
    networks: [aml-net]

  redis:
    image: redis:7-alpine
    # No host port: avoids clash with OS/package Redis on 6379; apps use hostname `redis` on aml-net.
    # To expose for local redis-cli debugging only: add → ports: ["16379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [aml-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
      # Always use Compose service names — do NOT take POSTGRES_URL/NEO4J_URI/etc. from .env here (often localhost for local dev).
      POSTGRES_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/aml_platform
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      RETENTION_INTERNAL_API_KEY: ${RETENTION_INTERNAL_API_KEY:-}
      RETENTION_HARD_PURGE_GRACE_DAYS: ${RETENTION_HARD_PURGE_GRACE_DAYS:-30}
      RETENTION_EMBEDDED_RUN_INTERVAL_HOURS: ${RETENTION_EMBEDDED_RUN_INTERVAL_HOURS:-0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      MODEL_PATH: ${MODEL_PATH:-/app/models/gnn_model.pt}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 15s
      timeout: 10s
      retries: 25
      start_period: 180s
    restart: unless-stopped
    networks: [aml-net]

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=INFO"]
    env_file:
      - ./.env
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/aml_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      RETENTION_RUN_NOW_URL: ${RETENTION_RUN_NOW_URL:-http://backend:8000/api/v1/admin/retention/run-now}
      MI_TICK_URL: ${MI_TICK_URL:-http://backend:8000/api/v1/reports/mi/tick-schedules}
      RETENTION_INTERNAL_API_KEY: ${RETENTION_INTERNAL_API_KEY:-}
      MI_SCHEDULE_INTERNAL_API_KEY: ${MI_SCHEDULE_INTERNAL_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [aml-net]

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=INFO"]
    env_file:
      - ./.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      RETENTION_RUN_NOW_URL: ${RETENTION_RUN_NOW_URL:-http://backend:8000/api/v1/admin/retention/run-now}
      RETENTION_INTERNAL_API_KEY: ${RETENTION_INTERNAL_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [aml-net]

  ml-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "python -c \"print('ml-worker placeholder'); import time; time.sleep(10**9)\""]
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [aml-net]
    deploy:
      resources:
        reservations:
          devices: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks: [aml-net]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [aml-net]

networks:
  aml-net:
    driver: bridge

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:

